<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>똥슐랭 가이드 Lite — v5.8</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- APP BAR -->
  <header class="app-bar">
    <div class="ab-row">
      <div class="logo">
        <img src="assets/pop_chelin_main_character.png" alt="똥슐랭 로고" class="logo-img">
        <span class="header-title">똥슐랭 가이드</span>
      </div>
      <div class="ab-acts">
        <button class="chip" id="scrap-btn">📌 스크랩</button>
        <button class="chip" id="mypage-btn">👤 마이페이지</button>
      </div>
    </div>
    <div class="search-wrap">
      <span>🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="식당, 지역 또는 '마라탕' 검색">
    </div>
  </header>

  <!-- DOUBLE FILTER BAR -->
  <section class="filter-section">
    <div class="filter-container">
      <div class="filter-label">장 편안함</div>
      <div class="filter-row" id="filter-row-safety">
        <button class="chip active" data-filter="safe">안심🟢</button>
        <button class="chip active" data-filter="caution">보통🟡</button>
        <button class="chip active" data-filter="warning">주의🔴</button>
      </div>
      <div class="filter-label">화장실 조건</div>
      <div class="filter-row" id="filter-row-toilet">
        <button class="chip" data-filter="toilet-sep">남녀분리</button>
        <button class="chip" data-filter="toilet-clean">청결도 우수</button>
        <button class="chip" data-filter="toilet-space">칸수 여유</button>
        <button class="chip" data-filter="toilet-towel">핸드타올</button>
      </div>
    </div>
  </section>

  <!-- EDITOR'S PICK BANNER -->
  <div class="banner-container">
    <div class="editor-banner">
      <span class="eb-label">EDITOR'S PICK</span>
      <h2 class="eb-title">장(腸)내 평화를 위한<br>이 에디터의 최애 맛집은?</h2>
      <p class="eb-desc">화장실 동선까지 완벽한 곳만 골랐습니다.</p>
      <img src="assets/pop_chelin_main_character.png" alt="캐릭터" class="eb-character">
      <div class="eb-emoji">✨</div>
    </div>
  </div>

  <main class="main-content">
    <h2 class="section-title" id="list-title">📍 내 주변 안심 맛집</h2>
    <!-- Restaurant Grid -->
    <div class="card-grid" id="restaurant-grid">
      <!-- Generated by JS -->
    </div>
  </main>

  <!-- DETAIL MODAL (BOTTOM SHEET) -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="bsheet" id="detail-bsheet">
      <button class="modal-close-btn" id="modal-close-btn">✕</button>

      <!-- 상단 핸들 제거 (이미지가 채우므로) -->
      
      <div class="sheet-body">
        <!-- 상단 이미지 -->
        <img id="modal-image" class="modal-hero-img" src="" alt="식당 이미지">

        <!-- 타이틀 + 배지 + 북마크 -->
        <div class="sh-title-row" style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px;">
          <div class="name-with-bm" style="display:flex; align-items:center; gap:12px;">
            <h1 class="modal-name" id="modal-name">식당 이름</h1>
            <button class="bm-btn" id="modal-bookmark-btn">
              <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            </button>
          </div>
          <div id="modal-traffic-badge"></div>
        </div>
        <p class="card-meta" id="modal-loc" style="margin-top:-4px; font-size:13px; color:var(--g500);">📍 위치 정보</p>

        <!-- ① 스코어 보드 -->
        <div class="score-grid" style="margin-top:20px;">
          <div class="score-card">
            <div class="sc-lbl">🍽 맛 & 장 편안함</div>
            <div class="sc-val" id="score-taste">0.0</div>
          </div>
          <div class="score-card">
            <div class="sc-lbl">🚽 화장실 쾌적도</div>
            <div class="sc-val" id="score-toilet">0.0</div>
          </div>
        </div>

        <!-- ② 장 편안함 키워드 (Food Tags 전용) -->
        <h3 class="section-title">🍽 장 편안함 키워드</h3>
        <div class="kw-cloud" id="modal-food-keywords"></div>

        <!-- ③ IBS 메뉴 섹션 (동적 타이틀) -->
        <h3 class="section-title" id="modal-menu-title">🏆 IBS 추천 메뉴 TOP 3</h3>
        <div class="menu-box">
          <ul id="modal-menu-list" style="list-style:none;"></ul>
        </div>

        <!-- ④ 화장실 키워드 (Toilet Tags 전용) -->
        <h3 class="section-title">🚽 화장실 상세 지표</h3>
        <div class="kw-cloud" id="modal-toilet-keywords"></div>

        <!-- ⑤ AI 요약 -->
        <h3 class="section-title">✨ AI 한 줄 요약</h3>
        <div class="ai-box">
          <p class="ai-notice">※ 리뷰 데이터 기반 자동 분석</p>
          <div class="ai-txt" id="modal-ai-summary">분석 중...</div>
        </div>

        <!-- ⑥ 리뷰 리스트 -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin:32px 0 16px;">
          <h3 class="section-title" style="margin:0;">💬 유저 리뷰</h3>
          <div class="rv-filter-wrap" id="review-filter-wrap">
            <button class="chip active" data-type="all">전체</button>
            <button class="chip" data-type="설사형">💨 설사형</button>
            <button class="chip" data-type="변비형">🪨 변비형</button>
          </div>
        </div>
        <div id="modal-reviews"></div>
      </div>

      <!-- 하단 플로팅 버튼 -->
      <div class="fab-wrap">
        <button class="fab" id="open-review-modal-btn">✏️ 리뷰 작성하기</button>
      </div>
    </div>
  </div>

  <!-- 4-STEP REVIEW MODAL -->
  <div class="modal-overlay" id="review-modal-overlay">
    <div class="bsheet" id="review-bsheet">
      <button class="modal-close-btn" id="review-close-btn">✕</button>
      <div class="handle-area"><div class="handle-bar"></div></div>
      <div class="sheet-body" id="review-steps-container">
        <!-- JS로 주입 -->
      </div>
    </div>
  </div>

  <!-- MY PAGE MODAL -->
  <div class="modal-overlay" id="mypage-modal-overlay">
    <div class="bsheet" id="mypage-bsheet">
      <button class="modal-close-btn" id="mypage-close-btn">✕</button>
      <div class="handle-area"><div class="handle-bar"></div></div>
      <div class="sheet-body" id="mypage-container">
        <!-- JS로 주입 -->
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
