<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>똥슐랭 가이드 — Design v5.6</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <!-- APP BAR -->
  <header class="app-bar">
    <div class="ab-row">
      <div class="logo">
        <div class="logo-mark">💩</div>
        <span class="header-title">똥슐랭 가이드</span>
      </div>
      <div class="ab-acts">
        <button class="chip" id="scrap-toggle-btn">📌 저장됨</button>
      </div>
    </div>
    <div class="search-wrap">
      <span>🔍</span>
      <input type="text" class="search-input" id="search-input" placeholder="식당 이름 또는 지역 검색">
    </div>
  </header>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filter-bar">
    <button class="chip active" data-filter="all">전체</button>
    <button class="chip" data-filter="safe">안심</button>
    <button class="chip" data-filter="caution">보통</button>
    <button class="chip" data-filter="warning">주의</button>
    <div style="width:1px; height:20px; background:var(--g200); margin:0 4px; flex-shrink:0;"></div>
    <button class="chip" data-filter="toilet-sep">남녀분리</button>
    <button class="chip" data-filter="toilet-clean">청결도</button>
  </div>

  <main class="main-content">
    <h2 class="section-title">📍 내 주변 안심 맛집</h2>
    <!-- Restaurant Grid -->
    <div class="card-grid" id="restaurant-grid">
      <!-- Generated by JS -->
    </div>
  </main>

  <!-- DETAIL MODAL (BOTTOM SHEET) -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="bsheet" id="detail-bsheet">
      <button class="modal-close-btn" id="modal-close-btn">✕</button>

      <div class="handle-area">
        <div class="handle-bar"></div>
      </div>
      
      <div class="sheet-body">
        <!-- 상단 이미지 -->
        <img id="modal-image" class="modal-hero-img" src="" alt="식당 이미지">

        <!-- 타이틀 + 배지 + 북마크 -->
        <div class="sh-title-row">
          <div class="name-with-bm">
            <h1 class="modal-name" id="modal-name">식당 이름</h1>
            <button class="bm-btn" id="modal-bookmark-btn">
              <svg viewBox="0 0 24 24"><path d="M17 3H7c-1.1 0-2 .9-2 2v16l7-3 7 3V5c0-1.1-.9-2-2-2z"/></svg>
            </button>
          </div>
          <div id="modal-traffic-badge">
            <!-- Flat Badge injected here -->
          </div>
        </div>
        <p class="card-meta" id="modal-loc" style="margin-top: -4px;">📍 위치 정보</p>

        <!-- ① 스코어 보드 -->
        <div class="score-grid" style="margin-top: 24px;">
          <div class="score-card">
            <div class="sc-lbl">🍽 맛 & 장 편안함</div>
            <div class="sc-val" id="score-taste">0.0</div>
          </div>
          <div class="score-card">
            <div class="sc-lbl">🚽 화장실 쾌적도</div>
            <div class="sc-val" id="score-toilet">0.0</div>
          </div>
        </div>

        <!-- ② IBS 추천 메뉴 TOP 3 (or Caution Guide) -->
        <h3 class="section-title">🏆 IBS 추천 메뉴 TOP 3</h3>
        <div class="menu-box">
          <ul id="modal-menu-list" style="list-style:none;">
            <!-- Menu items with dots injected here -->
          </ul>
        </div>

        <!-- ③ 화장실 키워드 (Coupled only with toilet data) -->
        <h3 class="section-title">🚽 화장실 키워드</h3>
        <div class="kw-cloud" id="modal-keywords">
          <!-- Keywords injected here -->
        </div>

        <!-- ④ AI 요약 섹션 -->
        <h3 class="section-title">✨ AI 한 줄 요약</h3>
        <div class="ai-box">
          <div class="ai-top">
            <div class="ai-badge">AI 분석</div>
            <span class="ai-notice">※ 실제 정보와 차이가 있을 수 있습니다</span>
          </div>
          <div class="ai-txt" id="modal-ai-summary">
            리뷰 데이터를 분석 중입니다...
          </div>
        </div>

        <!-- ⑤ 유저 리뷰 리스트 + 필터 -->
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; margin-top:32px;">
          <h3 class="section-title" id="review-title" style="margin-bottom:0;">💬 유저 리뷰</h3>
          <div id="review-filter-wrap" style="display:flex; gap:6px;">
            <button class="chip active" style="padding:4px 10px; font-size:11px;" data-type="all">전체</button>
            <button class="chip" style="padding:4px 10px; font-size:11px;" data-type="설사형">💨 설사형</button>
            <button class="chip" style="padding:4px 10px; font-size:11px;" data-type="변비형">🪨 변비형</button>
          </div>
        </div>
        <div id="modal-reviews">
          <!-- reviews injected here -->
        </div>
      </div>

      <!-- 하단 플로팅 버튼 -->
      <div class="fab-wrap">
        <button class="fab" id="open-review-modal-btn">✏️ 리뷰 작성하기</button>
      </div>
    </div>
  </div>

  <!-- REVIEW SUBMISSION MODAL (4-Step Mockup) -->
  <div class="modal-overlay" id="review-modal-overlay">
    <div class="bsheet" id="review-steps-container" style="padding:40px 24px;">
      <!-- Steps injected by renderReviewStep() -->
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
